{% extends 'layout.html' %}
{% block title %}History{% endblock title %}
{% block style %}{% endblock style%}

{% block body %}
<div class="accordion" id="historySections">
	<div class="accordion-item">
		<h2 class="accordion-header" id="headingSummary">
			<button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSummary" aria-expanded="false" aria-controls="collapseSummary">
				Summary Bandwith History
			</button>
		</h2>
		<div id="collapseSummary" class="accordion-collapse collapse" aria-labelledby="headingSummary" data-bs-parent="#historySections">
			<div class="accordion-body">
				{% include 'history_services/summary_bandwith.html' %}
			</div>
		</div>
	</div>
	<div class="accordion-item">
		<h2 class="accordion-header" id="headingIpAlloc">
			<button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseIpAlloc" aria-expanded="false" aria-controls="collapseIpAlloc">
				IP Allocation History
			</button>
		</h2>
		<div id="collapseIpAlloc" class="accordion-collapse collapse" aria-labelledby="headingIpAlloc" data-bs-parent="#historySections">
			<div class="accordion-body">
				{% include 'history_services/ip_allocation.html' %}
			</div>
		</div>
	</div>
</div>
{% endblock body %}
{% block script %}{% endblock script %}
